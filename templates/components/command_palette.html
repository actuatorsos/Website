{# Command Palette (Ctrl+K) Component #}
{# Include in base_admin.html for global search functionality #}

<dialog id="command-palette" class="modal">
    <div class="modal-box w-11/12 max-w-2xl bg-base-200 p-0 overflow-hidden">
        {# Search Input #}
        <div class="flex items-center gap-3 px-4 py-3 border-b border-base-300">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-base-content/50" fill="none" viewBox="0 0 24 24"
                stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <input type="text" id="command-palette-input"
                class="input input-ghost w-full focus:outline-none bg-transparent text-lg"
                placeholder="ابحث عن موظفين، أصول، آلات..." hx-get="/api/search" hx-trigger="keyup changed delay:300ms"
                hx-target="#search-results" name="q" autocomplete="off" autofocus>
            <kbd class="kbd kbd-sm">ESC</kbd>
        </div>

        {# Search Results #}
        <div id="search-results" class="max-h-96 overflow-y-auto p-2">
            <div class="text-center text-base-content/50 py-8">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-2 opacity-50" fill="none"
                    viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1"
                        d="M8 16l2.879-2.879m0 0a3 3 0 104.243-4.242 3 3 0 00-4.243 4.242zM21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <p>اكتب للبحث...</p>
                <p class="text-sm mt-1">موظفين • أصول • آلات • عملاء</p>
            </div>
        </div>

        {# Footer with shortcuts #}
        <div
            class="flex items-center justify-between px-4 py-2 border-t border-base-300 bg-base-300/50 text-xs text-base-content/50">
            <div class="flex items-center gap-4">
                <span><kbd class="kbd kbd-xs">↑↓</kbd> للتنقل</span>
                <span><kbd class="kbd kbd-xs">Enter</kbd> للفتح</span>
            </div>
            <span><kbd class="kbd kbd-xs">Ctrl</kbd> + <kbd class="kbd kbd-xs">K</kbd> لفتح البحث</span>
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>

<script>
    // Command Palette keyboard shortcut
    document.addEventListener('keydown', function (e) {
        // Ctrl+K or Cmd+K to open
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            const modal = document.getElementById('command-palette');
            modal.showModal();
            setTimeout(() => {
                document.getElementById('command-palette-input').focus();
            }, 100);
        }
    });

    // Clear search when modal closes
    document.getElementById('command-palette').addEventListener('close', function () {
        document.getElementById('command-palette-input').value = '';
        document.getElementById('search-results').innerHTML = `
        <div class="text-center text-base-content/50 py-8">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-12 w-12 mx-auto mb-2 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 16l2.879-2.879m0 0a3 3 0 104.243-4.242 3 3 0 00-4.243 4.242zM21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <p>اكتب للبحث...</p>
            <p class="text-sm mt-1">موظفين • أصول • آلات • عملاء</p>
        </div>
    `;
    });
</script>
