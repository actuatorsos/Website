{# DaisyUI Modal Component #}
{# Usage: Include this template and trigger with document.getElementById('modal-id').showModal() #}

<dialog id="{{ modal_id }}" class="modal modal-bottom sm:modal-middle">
    <div class="modal-box bg-base-200">
        <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2">✕</button>
        </form>
        <h3 class="font-bold text-lg text-primary">{{ modal_title }}</h3>
        <div class="py-4">
            {{ modal_content|safe }}
        </div>
        <div class="modal-action">
            <form method="dialog">
                <button class="btn btn-ghost">{{ t.get("cancel").unwrap_or(&"إلغاء".to_string()) }}</button>
            </form>
            {{ modal_actions|safe }}
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button>close</button>
    </form>
</dialog>
