<tr class="hover:bg-surface border-l-2 border-l-transparent hover:border-l-cyan-struct transition-none transition-none cursor-pointer"
    onclick="window.location.href='/admin/documents/machine/{{ machine.id_string() }}'">
    <td class="px-6 py-4 font-medium text-text-primary">{{ machine.serial_number }}</td>
    <td class="px-6 py-4 text-text-muted font-tech text-sm">{{ machine.model }}</td>
    <td class="px-6 py-4 text-text-muted font-tech text-sm">{{ machine.manufacturer }}</td>
    <td class="px-6 py-4 text-text-muted font-tech text-sm">
        {% match machine.customer_name %}
        {% when Some with (name) %}{{ name }}{% when None %}-{% endmatch %}
    </td>
    <td class="px-6 py-4">
        <span class="px-2 py-1 text-xs rounded-none border border-current {{ machine.status_class() }}">
            {{ machine.status }}
        </span>
    </td>
</tr>
