<tr class="hover:bg-surface border-l-2 border-l-transparent hover:border-l-cyan-struct transition-none transition-none cursor-pointer"
    onclick="window.location.href='/admin/documents/project/{{ project.id_string() }}'">
    <td class="px-6 py-4 font-medium text-text-primary">{{ project.title }}</td>
    <td class="px-6 py-4 text-text-muted font-tech text-sm">
        {% match project.customer_name %}
        {% when Some with (name) %}{{ name }}{% when None %}-{% endmatch %}
    </td>
    <td class="px-6 py-4 text-text-muted font-tech text-sm">{{ project.start_date }}</td>
    <td class="px-6 py-4">
        <span class="px-2 py-1 text-xs rounded-none border border-current {{ project.status_class() }}">
            {{ project.status }}
        </span>
    </td>
    <td class="px-6 py-4 text-text-muted font-tech text-sm">
        {% match project.budget %}
        {% when Some with (b) %}{{ b }}{% when None %}-{% endmatch %}
    </td>
</tr>
