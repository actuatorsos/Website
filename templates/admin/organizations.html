{% extends "admin/base_admin.html" %}

{% block admin_content %}
<div class="max-w-7xl mx-auto animate-fade-in">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-text-primary">{{ t["nav_organizations"] }}</h1>
            <p class="text-text-secondary mt-1">{{ t["cmd_organizations_desc"] }}</p>
        </div>
        <button onclick="openModal('addOrgModal')"
            class="flex items-center gap-2 bg-accent hover:bg-accent-focus text-white font-bold px-4 py-2 rounded-lg transition-colors shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
            </svg>
            <span>{{ t["add_organization"] }}</span>
        </button>
    </div>

    <div class="bg-surface rounded-2xl shadow-card overflow-hidden border border-border">
        <div class="overflow-x-auto">
            <table class="w-full text-start border-collapse">
                <thead>
                    <tr class="bg-background/30 border-b border-border">
                        <th class="px-6 py-4 text-start text-xs font-semibold text-text-secondary uppercase tracking-wider">{{ t["org_col_name"] }}</th>
                        <th class="px-6 py-4 text-start text-xs font-semibold text-text-secondary uppercase tracking-wider">{{ t["org_col_type"] }}</th>
                        <th class="px-6 py-4 text-start text-xs font-semibold text-text-secondary uppercase tracking-wider">{{ t["org_col_status"] }}</th>
                    </tr>
                </thead>
                <tbody id="org-table" class="divide-y divide-border">
                    <tr>
                        <td colspan="3" class="px-6 py-8 text-center text-text-secondary">
                            {{ t["org_empty"] }}
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Add Organization Modal -->
<div id="addOrgModal"
    class="fixed inset-0 bg-background/80 backdrop-blur-sm z-50 hidden opacity-0 transition-opacity duration-300 overflow-y-auto">
    <div class="flex min-h-full items-center justify-center p-4 sm:p-0">
        <div class="relative transform overflow-hidden rounded-2xl bg-surface text-start shadow-xl transition-all sm:my-8 sm:w-full sm:max-w-lg border border-border scale-95 opacity-0 duration-300"
            id="addOrgModalContent">

            <div class="px-6 py-4 border-b border-border flex justify-between items-center bg-background/50">
                <h3 class="text-xl font-bold text-text-primary">{{ t["add_organization"] }}</h3>
                <button type="button" onclick="closeModal('addOrgModal')"
                    class="text-text-secondary hover:text-red-500 transition-colors rounded-lg p-1 hover:bg-red-500/10">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <div class="px-6 py-6">
                <form id="addOrgForm" onsubmit="addOrg(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-text-secondary mb-1">{{ t["org_col_name"] }}</label>
                        <input type="text" id="orgName" required
                            class="w-full bg-background border border-border rounded-xl px-4 py-2.5 text-text-primary focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-smooth">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-text-secondary mb-1">{{ t["org_col_type"] }}</label>
                        <select id="orgType" required
                            class="w-full bg-background border border-border rounded-xl px-4 py-2.5 text-text-primary focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-smooth">
                            <option value="startup">{{ t["org_type_startup"] }}</option>
                            <option value="volunteer_team">{{ t["org_type_volunteer"] }}</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-text-secondary mb-1">{{ t["form_email"] }}</label>
                        <input type="email" id="orgEmail"
                            class="w-full bg-background border border-border rounded-xl px-4 py-2.5 text-text-primary focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-smooth dir-ltr text-end"
                            placeholder="org@example.com">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-text-secondary mb-1">{{ t["form_phone"] }}</label>
                        <input type="tel" id="orgPhone"
                            class="w-full bg-background border border-border rounded-xl px-4 py-2.5 text-text-primary focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-smooth dir-ltr text-end">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-text-secondary mb-1">{{ t["form_description"] }}</label>
                        <textarea id="orgDesc" rows="3"
                            class="w-full bg-background border border-border rounded-xl px-4 py-2.5 text-text-primary focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent transition-smooth"></textarea>
                    </div>

                    <div class="mt-8 flex flex-col-reverse sm:flex-row sm:justify-end sm:gap-3">
                        <button type="button" onclick="closeModal('addOrgModal')"
                            class="mt-3 inline-flex w-full justify-center rounded-xl bg-background px-4 py-2.5 text-sm font-bold text-text-secondary hover:text-text-primary border border-border hover:bg-surface shadow-sm sm:mt-0 sm:w-auto transition-smooth">
                            {{ t["cancel"] }}
                        </button>
                        <button type="submit" id="addOrgBtn"
                            class="inline-flex w-full justify-center rounded-xl bg-accent hover:bg-accent-focus px-4 py-2.5 text-sm font-bold text-white shadow-sm hover:shadow-md sm:w-auto transition-smooth">
                            {{ t["form_submit"] }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    function openModal(modalId) {
        const modal = document.getElementById(modalId);
        const content = document.getElementById(modalId + 'Content');
        modal.classList.remove('hidden');
        requestAnimationFrame(() => {
            modal.classList.remove('opacity-0');
            modal.classList.add('opacity-100');
            content.classList.remove('scale-95', 'opacity-0');
            content.classList.add('scale-100', 'opacity-100');
        });
    }

    function closeModal(modalId) {
        const modal = document.getElementById(modalId);
        const content = document.getElementById(modalId + 'Content');
        modal.classList.remove('opacity-100');
        modal.classList.add('opacity-0');
        content.classList.remove('scale-100', 'opacity-100');
        content.classList.add('scale-95', 'opacity-0');
        setTimeout(() => modal.classList.add('hidden'), 300);
    }

    const statusColors = {
        'active': 'bg-success/20 text-success',
        'inactive': 'bg-error/20 text-error',
        'pending': 'bg-warning/20 text-warning',
    };

    async function loadOrganizations() {
        try {
            const res = await fetch('/api/organizations');
            if (!res.ok) throw new Error('Failed to fetch');
            const data = await res.json();
            const tbody = document.getElementById('org-table');

            if (!data || data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3" class="px-6 py-8 text-center text-text-secondary">{{ t["org_empty"] }}</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(org => {
                const statusId = (org.status || 'active').toLowerCase();
                const sColor = statusColors[statusId] || 'bg-surface text-text-secondary';

                return `<tr class="hover:bg-background/50 transition-colors group">
                    <td class="px-6 py-4 whitespace-nowrap">
                        <div class="font-bold text-text-primary group-hover:text-secondary transition-colors">${org.name}</div>
                        ${org.email ? `<div class="text-xs text-text-secondary mt-0.5">${org.email}</div>` : ''}
                    </td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-text-primary">${org.org_type}</td>
                    <td class="px-6 py-4 whitespace-nowrap">
                        <span class="px-2.5 py-1 rounded-full text-xs font-bold ${sColor}">${org.status}</span>
                    </td>
                </tr>`;
            }).join('');
        } catch (err) {
            console.error('Error loading organizations:', err);
        }
    }

    async function addOrg(e) {
        e.preventDefault();
        const btn = document.getElementById('addOrgBtn');
        btn.disabled = true;
        btn.textContent = '...';

        try {
            const res = await fetch('/api/organizations', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: document.getElementById('orgName').value,
                    org_type: document.getElementById('orgType').value,
                    email: document.getElementById('orgEmail').value || null,
                    phone: document.getElementById('orgPhone').value || null,
                    description: document.getElementById('orgDesc').value || null,
                }),
            });
            if (res.ok) {
                closeModal('addOrgModal');
                loadOrganizations();
            } else {
                const data = await res.json();
                showToast(data.error || 'Error', 'error');
            }
        } catch (err) {
            showToast(err.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = '{{ t["form_submit"] }}';
        }
    }

    document.addEventListener('DOMContentLoaded', loadOrganizations);
</script>
{% endblock %}
