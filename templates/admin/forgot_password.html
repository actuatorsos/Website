<!DOCTYPE html>
<html lang="{{ lang }}" dir="{{ dir }}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نسيت كلمة المرور — Actuators</title>
    <meta name="description" content="Actuators — إعادة تعيين كلمة المرور">
    <link rel="icon" href="/static/logo.svg" type="image/svg+xml">
    <meta name="theme-color" content="#0B1A2A">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* ── Actuators Brand System ── */
        :root {
            --bg-primary: #0B1A2A;
            --bg-surface: rgba(11, 26, 42, 0.8);
            --text-primary: #FFFFFF;
            --text-muted: rgba(255, 255, 255, 0.6);
            --structure-cyan: #00B7C2;
            --structure-cyan-muted: rgba(0, 183, 194, 0.3);
            --activation-orange: #FF6A2A;
            --font-primary-ar: 'IBM Plex Sans Arabic', sans-serif;
            --font-primary-en: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-primary-ar);
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                linear-gradient(var(--structure-cyan-muted) 1px, transparent 1px),
                linear-gradient(90deg, var(--structure-cyan-muted) 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.15;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            inset: 0;
            background-image:
                radial-gradient(circle, var(--structure-cyan-muted) 1px, transparent 1px);
            background-size: 60px 60px;
            background-position: 30px 30px;
            opacity: 0.3;
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 16px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-section svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
        }

        .brand-sub {
            font-size: 13px;
            color: var(--text-muted);
        }

        .login-card {
            background: var(--bg-surface);
            border: 1px solid var(--structure-cyan-muted);
            border-radius: 2px;
            padding: 32px;
        }

        .login-card h2 {
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 24px;
            color: var(--text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            inset-inline-start: 12px;
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px 10px 12px;
            padding-inline-start: 40px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid var(--structure-cyan-muted);
            border-radius: 2px;
            color: var(--text-primary);
            font-family: var(--font-primary-ar);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s linear;
        }

        .form-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
        }

        .form-input:focus {
            border-color: var(--structure-cyan);
        }

        .error-msg {
            display: none;
            background: rgba(255, 106, 42, 0.08);
            border: 1px solid rgba(255, 106, 42, 0.3);
            border-radius: 2px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            color: var(--activation-orange);
        }

        .error-msg.visible {
            display: block;
        }

        .error-msg.shake {
            animation: shake 0.4s linear;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            50% { transform: translateX(4px); }
            75% { transform: translateX(-4px); }
        }

        .success-msg {
            display: none;
            background: rgba(0, 183, 194, 0.08);
            border: 1px solid rgba(0, 183, 194, 0.3);
            border-radius: 2px;
            padding: 10px 14px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
            color: var(--structure-cyan);
        }

        .success-msg.visible {
            display: block;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background: var(--activation-orange);
            color: var(--bg-primary);
            font-family: var(--font-primary-ar);
            font-size: 15px;
            font-weight: 700;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: opacity 0.2s linear;
        }

        .btn-submit:hover {
            opacity: 0.9;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(11, 26, 42, 0.3);
            border-top-color: var(--bg-primary);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        .spinner.visible {
            display: block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .structure-line {
            width: 100%;
            height: 1px;
            background: var(--structure-cyan-muted);
            margin: 24px 0;
        }

        .login-footer {
            text-align: center;
            margin-top: 24px;
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
            opacity: 0.5;
        }

        .login-links {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 16px;
        }

        .login-links a {
            font-size: 12px;
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.15s linear;
            font-family: var(--font-primary-ar);
        }

        .login-links a:hover {
            color: var(--structure-cyan);
        }

        .home-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
            padding: 8px 16px;
            border: 1px solid var(--structure-cyan-muted);
            background: transparent;
            color: var(--text-muted);
            font-family: var(--font-mono);
            font-size: 11px;
            text-decoration: none;
            letter-spacing: 0.1em;
            transition: all 0.15s linear;
        }

        .home-link:hover {
            border-color: var(--structure-cyan);
            color: var(--structure-cyan);
        }

        .assemble {
            opacity: 0;
            transform: translateY(8px);
            animation: assemble 0.3s linear forwards;
        }

        .assemble-1 { animation-delay: 0.05s; }
        .assemble-2 { animation-delay: 0.1s; }
        .assemble-3 { animation-delay: 0.15s; }

        @keyframes assemble {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .corner-marks {
            position: absolute;
            inset: -1px;
            pointer-events: none;
        }

        .corner-marks::before,
        .corner-marks::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border-color: var(--structure-cyan);
            border-style: solid;
        }

        .corner-marks::before {
            top: 0;
            inset-inline-start: 0;
            border-width: 1px 0 0 1px;
        }

        .corner-marks::after {
            bottom: 0;
            inset-inline-end: 0;
            border-width: 0 1px 1px 0;
        }

        .corner-marks-alt::before {
            top: 0;
            inset-inline-end: 0;
            inset-inline-start: auto;
            border-width: 1px 1px 0 0;
        }

        .corner-marks-alt::after {
            bottom: 0;
            inset-inline-start: 0;
            inset-inline-end: auto;
            border-width: 0 0 1px 1px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <!-- Logo -->
        <div class="logo-section assemble assemble-1">
            <svg style="width:80px;height:80px;margin-bottom:12px;" viewBox="0 0 120 120">
                <use href="/static/icons.svg#icon-logo"></use>
            </svg>
            <svg style="width:260px;height:50px;margin-bottom:8px;" viewBox="0 0 1000 400">
                <use href="/static/icons.svg#icon-actuator-logo"></use>
            </svg>
            <div class="brand-sub">{{ t["auto_login_308"] }}</div>
        </div>

        <!-- Forgot Password Card -->
        <div class="login-card assemble assemble-2" style="position: relative;">
            <div class="corner-marks"></div>
            <div class="corner-marks corner-marks-alt"></div>

            <h2>نسيت كلمة المرور</h2>

            <!-- Error -->
            <div id="forgot-error" class="error-msg"></div>

            <!-- Success -->
            <div id="forgot-success" class="success-msg"></div>

            <form id="forgot-form">
                <!-- Email -->
                <div class="form-group">
                    <label class="form-label">{{ t["form_email"] }}</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                                d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
                        </svg>
                        <input type="email" id="email" name="email" required autocomplete="email"
                            placeholder="user@actuators.com" class="form-input">
                    </div>
                </div>

                <div class="structure-line"></div>

                <!-- Submit -->
                <button type="submit" id="forgot-btn" class="btn-submit">
                    <span id="btn-text">إرسال رابط إعادة التعيين</span>
                    <div id="btn-spinner" class="spinner"></div>
                </button>

                <!-- Login Link -->
                <div class="login-links">
                    <a href="/admin/login?lang={{ lang }}">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:inline;vertical-align:middle;margin-inline-end:4px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
                        </svg>
                        العودة لتسجيل الدخول
                    </a>
                </div>
            </form>
        </div>

        <!-- Home Button -->
        <div style="text-align:center;" class="assemble assemble-3">
            <a href="/?lang={{ lang }}" class="home-link">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <path stroke-linecap="square" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z"/>
                </svg>
                الصفحة الرئيسية
            </a>
        </div>

        <!-- Footer -->
        <div class="login-footer assemble assemble-3">
            &copy; 2026 Actuators L.L.C
        </div>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const btn = document.getElementById('forgot-btn');
            const btnText = document.getElementById('btn-text');
            const spinner = document.getElementById('btn-spinner');
            const errorDiv = document.getElementById('forgot-error');
            const successDiv = document.getElementById('forgot-success');

            const email = document.getElementById('email').value;

            btn.disabled = true;
            btnText.textContent = 'جاري الإرسال...';
            spinner.classList.add('visible');
            errorDiv.classList.remove('visible');
            successDiv.classList.remove('visible');

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email }),
                });

                const data = await res.json();

                if (res.ok) {
                    successDiv.textContent = 'إذا كان البريد مسجلاً، سيتم إرسال رابط إعادة التعيين';
                    successDiv.classList.add('visible');
                    btnText.textContent = 'تم الإرسال';
                    spinner.classList.remove('visible');
                } else {
                    // Still show success message for security (don't reveal if email exists)
                    successDiv.textContent = 'إذا كان البريد مسجلاً، سيتم إرسال رابط إعادة التعيين';
                    successDiv.classList.add('visible');
                    btnText.textContent = 'تم الإرسال';
                    spinner.classList.remove('visible');
                }
            } catch (err) {
                errorDiv.textContent = err.message || 'خطأ في الاتصال بالخادم';
                errorDiv.classList.add('visible');
                errorDiv.classList.add('shake');
                setTimeout(() => errorDiv.classList.remove('shake'), 400);

                btn.disabled = false;
                btnText.textContent = 'إرسال رابط إعادة التعيين';
                spinner.classList.remove('visible');
            }
        });
    </script>
</body>

</html>
