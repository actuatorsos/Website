{% extends "admin/base_admin.html" %}

{% block admin_content %}
<div class="max-w-7xl mx-auto animate-fade-in relative">
    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-primary">{{ t["trainees_title"] }}</h1>
            <p class="text-text-secondary mt-1">{{ t["trainees_subtitle"] }}</p>
        </div>

        <div class="flex items-center gap-3">
            <div class="relative">
                <input type="text" id="traineeSearch" placeholder="Search trainees..."
                    class="pl-10 pr-4 py-2 bg-surface border border-border rounded-lg text-sm focus:ring-2 focus:ring-secondary outline-none w-64 transition-all">
                <svg class="w-5 h-5 text-text-secondary absolute left-3 top-2.5" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>

            <button onclick="document.getElementById('addTraineeModal').classList.remove('hidden')"
                class="flex items-center gap-2 bg-secondary hover:bg-secondary/90 text-white px-4 py-2 rounded-lg font-bold transition-smooth shadow-sm">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
                </svg>
                {{ t["add_trainee"] }}
            </button>
        </div>
    </div>

    <!-- Trainees Table -->
    <div class="bg-surface rounded-2xl shadow-card overflow-hidden border border-border">
        <div class="overflow-x-auto">
            <table class="w-full text-start border-collapse">
                <thead>
                    <tr class="bg-background/50 border-b border-border">
                        <th
                            class="px-6 py-4 text-start text-xs font-semibold text-text-secondary uppercase tracking-wider">
                            {{ t["table_name"] }}</th>
                        <th
                            class="px-6 py-4 text-start text-xs font-semibold text-text-secondary uppercase tracking-wider">
                            {{ t["table_phone"] }}</th>
                        <th
                            class="px-6 py-4 text-start text-xs font-semibold text-text-secondary uppercase tracking-wider">
                            {{ t["table_institution"] }}</th>
                        <th
                            class="px-6 py-4 text-start text-xs font-semibold text-text-secondary uppercase tracking-wider">
                            {{ t["table_status"] }}</th>
                        <th
                            class="px-6 py-4 text-end text-xs font-semibold text-text-secondary uppercase tracking-wider">
                            {{ t["table_actions"] }}</th>
                    </tr>
                </thead>
                <tbody id="trainees-tbody" class="divide-y divide-border" hx-get="/api/trainees" hx-trigger="load">
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal Overlay -->
<div id="addTraineeModal" class="hidden fixed inset-0 z-50 overflow-y-auto" aria-labelledby="modal-title" role="dialog"
    aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">

        <!-- Background overlay -->
        <div class="fixed inset-0 bg-gray-900/75 backdrop-blur-sm transition-opacity" aria-hidden="true"
            onclick="closeModal('addTraineeModal')"></div>

        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <!-- Modal panel -->
        <div
            class="inline-block align-bottom bg-surface rounded-2xl text-start overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-2xl sm:w-full border border-border">

            <div class="px-6 py-4 border-b border-border flex justify-between items-center bg-background/50">
                <h3 class="text-xl font-bold text-primary flex items-center gap-2" id="modal-title">
                    <svg class="w-5 h-5 text-secondary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                    </svg>
                    {{ t["add_trainee"] }}
                </h3>
                <button type="button" class="text-text-secondary hover:text-red-500 transition-smooth"
                    onclick="closeModal('addTraineeModal')">
                    <span class="sr-only">Close</span>
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>

            <form hx-post="/api/trainees" hx-target="#trainees-tbody" hx-swap="afterbegin"
                hx-on::after-request="closeModal('addTraineeModal'); this.reset();" class="px-6 py-6">

                <div class="grid md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-text-primary mb-2">{{ t["form_name"] }} *</label>
                        <input type="text" name="name" required
                            class="w-full px-4 py-2.5 bg-background border border-border rounded-xl focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-smooth outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-text-primary mb-2">{{ t["form_phone"] }} *</label>
                        <input type="tel" name="phone" required
                            class="w-full px-4 py-2.5 bg-background border border-border rounded-xl focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-smooth outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-text-primary mb-2">{{ t["form_institution"] }}
                            *</label>
                        <input type="text" name="institution" required
                            class="w-full px-4 py-2.5 bg-background border border-border rounded-xl focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-smooth outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-text-primary mb-2">{{ t["form_start_date"] }}
                            *</label>
                        <input type="date" name="start_date" required
                            class="w-full px-4 py-2.5 bg-background border border-border rounded-xl focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-smooth outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-text-primary mb-2">{{ t["form_end_date"] }}
                            *</label>
                        <input type="date" name="end_date" required
                            class="w-full px-4 py-2.5 bg-background border border-border rounded-xl focus:ring-2 focus:ring-secondary/50 focus:border-secondary transition-smooth outline-none">
                    </div>
                </div>

                <div class="mt-8 pt-6 border-t border-border flex items-center justify-end gap-3">
                    <button type="button" onclick="closeModal('addTraineeModal')"
                        class="px-6 py-2.5 border border-border rounded-xl text-text-secondary hover:bg-background transition-smooth font-medium">
                        {{ t["cancel"] }}
                    </button>
                    <button type="submit"
                        class="bg-secondary hover:bg-secondary/90 text-white px-8 py-2.5 rounded-xl font-medium transition-smooth shadow-sm hover:shadow">
                        {{ t["form_submit"] }}
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    function closeModal(modalId) {
        document.getElementById(modalId).classList.add('hidden');
    }

    // Front-end search filtering
    document.getElementById('traineeSearch').addEventListener('input', function (e) {
        const searchTerm = e.target.value.toLowerCase();
        const rows = document.querySelectorAll('#trainees-tbody tr');

        rows.forEach(row => {
            const textContent = row.textContent.toLowerCase();
            if (textContent.includes(searchTerm)) {
                row.style.display = '';
            } else {
                row.style.display = 'none';
            }
        });
    });
</script>
{% endblock %}
