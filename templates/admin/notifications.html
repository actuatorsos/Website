{% extends "admin/base_admin.html" %}
{% block admin_content %}
<div class="max-w-7xl mx-auto animate-fade-in" dir="{{ dir }}">

    <div class="flex flex-col md:flex-row md:items-center justify-between gap-4 mb-8">
        <div>
            <h1 class="text-3xl font-bold text-primary">{{ t["auto_notifications_341"] }}</h1>
            <p class="text-text-secondary mt-1">{{ t["auto_notifications_342"] }}</p>
        </div>
        <button onclick="markAllRead()"
            class="bg-accent/20 text-secondary px-5 py-2 rounded-xl text-sm font-semibold hover:bg-accent/30 transition-colors">
            {{ t["auto_notifications_343"] }}
        </button>
    </div>

    <!-- Notification Filters -->
    <div class="flex gap-2 mb-6 flex-wrap">
        <button onclick="filterNotif('all')" id="nf-all"
            class="notif-filter px-4 py-2 text-sm rounded-xl bg-secondary text-white font-semibold transition-colors">{{ t["auto_leave_288"] }}</button>
        <button onclick="filterNotif('unread')" id="nf-unread"
            class="notif-filter px-4 py-2 text-sm rounded-xl bg-background border border-border text-text-secondary font-semibold hover:bg-secondary/10 transition-colors">{{ t["auto_notifications_344"] }}</button>
        <button onclick="filterNotif('approval')" id="nf-approval"
            class="notif-filter px-4 py-2 text-sm rounded-xl bg-background border border-border text-text-secondary font-semibold hover:bg-secondary/10 transition-colors">{{ t["auto_agents_20"] }}</button>
        <button onclick="filterNotif('system')" id="nf-system"
            class="notif-filter px-4 py-2 text-sm rounded-xl bg-background border border-border text-text-secondary font-semibold hover:bg-secondary/10 transition-colors">{{ t["auto_notifications_345"] }}</button>
    </div>

    <!-- Notifications List -->
    <div id="notif-list" class="space-y-3">
        <div class="bg-surface rounded-2xl border border-border shadow-card p-6 text-center text-text-secondary">
            {{ t["loading"] }}
        </div>
    </div>

    <!-- Empty State -->
    <div id="notif-empty" class="hidden">
        <div class="bg-surface rounded-2xl border border-border shadow-card p-12 text-center">
            <svg class="w-16 h-16 mx-auto text-text-secondary/30 mb-4" fill="none" stroke="currentColor"
                viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                    d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
            </svg>
            <p class="text-lg font-semibold text-text-secondary mb-1">{{ t["auto_notifications_346"] }}</p>
            <p class="text-sm text-text-secondary/70">{{ t["auto_notifications_347"] }}</p>
        </div>
    </div>
</div>

<script>
    const typeIcons = {
        approval: `<div class="w-10 h-10 rounded-xl bg-yellow-500/10 flex items-center justify-center shrink-0"><svg class="w-5 h-5 text-yellow-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.957L13.732 4.285c-.77-1.29-2.694-1.29-3.464 0L3.34 16.043c-.77 1.29.192 2.957 1.732 2.957z" /></svg></div>`,
        system: `<div class="w-10 h-10 rounded-xl bg-blue-500/10 flex items-center justify-center shrink-0"><svg class="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></div>`,
        alert: `<div class="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center shrink-0"><svg class="w-5 h-5 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg></div>`,
        info: `<div class="w-10 h-10 rounded-xl bg-green-500/10 flex items-center justify-center shrink-0"><svg class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg></div>`
    };

    let currentNotifFilter = 'all';
    let allNotifs = [];

    async function loadNotifications() {
        try {
            const res = await fetch('/api/notifications');
            allNotifs = await res.json() || [];
        } catch (e) {
            allNotifs = [];
        }
        renderNotifs();
    }

    function renderNotifs() {
        let filtered = allNotifs;
        if (currentNotifFilter === 'unread') filtered = allNotifs.filter(n => !n.is_read);
        else if (currentNotifFilter !== 'all') filtered = allNotifs.filter(n => n.notification_type === currentNotifFilter);

        const list = document.getElementById('notif-list');
        const empty = document.getElementById('notif-empty');

        if (filtered.length === 0) {
            list.classList.add('hidden');
            empty.classList.remove('hidden');
            return;
        }
        empty.classList.add('hidden');
        list.classList.remove('hidden');
        list.innerHTML = filtered.map(n => `
        <div class="bg-surface rounded-2xl border ${n.is_read ? 'border-border' : 'border-secondary/30 shadow-md'} shadow-card p-4 flex items-start gap-4 hover:shadow-hover transition-all cursor-pointer group" onclick="readNotif('${n.id?.id || ''}')">
            ${typeIcons[n.notification_type] || typeIcons.info}
            <div class="flex-1 min-w-0">
                <div class="flex items-start justify-between gap-2">
                    <h4 class="text-sm font-bold text-primary ${n.is_read ? 'opacity-70' : ''}">${n.title || 'إشعار'}</h4>
                    <span class="text-xs text-text-secondary shrink-0">${timeAgo(n.created_at)}</span>
                </div>
                <p class="text-sm text-text-secondary mt-1 ${n.is_read ? 'opacity-60' : ''}">${n.message || ''}</p>
                ${n.action_url ? `<a href="${n.action_url}" class="text-xs text-secondary hover:underline mt-2 inline-block">{{ t["auto_notifications_348"] }}</a>` : ''}
            </div>
            ${!n.is_read ? '<div class="w-2.5 h-2.5 bg-secondary rounded-full mt-1.5 shrink-0"></div>' : ''}
        </div>
    `).join('');
    }

    function filterNotif(type) {
        currentNotifFilter = type;
        document.querySelectorAll('.notif-filter').forEach(b => {
            b.classList.remove('bg-secondary', 'text-white'); b.classList.add('bg-background', 'border', 'border-border', 'text-text-secondary');
        });
        document.getElementById('nf-' + type).classList.add('bg-secondary', 'text-white');
        document.getElementById('nf-' + type).classList.remove('bg-background', 'border', 'border-border', 'text-text-secondary');
        renderNotifs();
    }

    async function readNotif(id) {
        if (!id) return;
        await fetch(`/api/notifications/${id}/read`, { method: 'PUT' });
        const notif = allNotifs.find(n => (n.id?.id || '') === id);
        if (notif) notif.is_read = true;
        renderNotifs();
    }

    async function markAllRead() {
        for (const n of allNotifs.filter(n => !n.is_read)) {
            await fetch(`/api/notifications/${n.id?.id || ''}/read`, { method: 'PUT' });
            n.is_read = true;
        }
        renderNotifs();
    }

    function timeAgo(dateStr) {
        if (!dateStr) return '';
        const diff = Math.floor((Date.now() - new Date(dateStr).getTime()) / 1000);
        if (diff < 60) return 'الآن';
        if (diff < 3600) return Math.floor(diff / 60) + ' د';
        if (diff < 86400) return Math.floor(diff / 3600) + ' س';
        return Math.floor(diff / 86400) + ' يوم';
    }

    loadNotifications();
</script>
{% endblock %}
