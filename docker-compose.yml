services:
  app:
    build: .
    container_name: dr_machine_web
    restart: unless-stopped
    ports:
      # Expose port 80 locally mapped to 3000 in the container
      - "80:3000"
    depends_on:
      - surrealdb
    environment:
      # Use the internal docker network to connect to SurrealDB
      - SURREAL_URL=ws://surrealdb:8000
      - SURREAL_USER=${SURREAL_USER:-root}
      - SURREAL_PASS=${SURREAL_PASS:-root123}
      - SURREAL_NS=dr_machine
      - SURREAL_DB=main
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=3000
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-dr_machine_2024}
    networks:
      - dr_machine_net

  surrealdb:
    image: surrealdb/surrealdb:latest
    container_name: dr_machine_db
    restart: unless-stopped
    # Avoid mapping the port publicly on production servers if possible, or bind to local only
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - surrealdb_data:/data
    # Pass user and password through env variations
    command: start --log info --user ${SURREAL_USER:-root} --pass ${SURREAL_PASS:-root123} file:/data/dr_machine.db
    networks:
      - dr_machine_net

networks:
  dr_machine_net:
    driver: bridge

volumes:
  surrealdb_data:
