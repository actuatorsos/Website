services:
  surrealdb:
    image: surrealdb/surrealdb:v2
    ports:
      - "8000:8000"
    volumes:
      - surrealdb_data:/data
    env_file: .env
    command: start --user ${SURREAL_USER} --pass ${SURREAL_PASS} file:/data/srdb.db
    networks:
      - app_network
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      SURREAL_URL: surrealdb:8000
    depends_on:
      surrealdb:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - app_network
    restart: unless-stopped

volumes:
  surrealdb_data:

networks:
  app_network:
    driver: bridge
