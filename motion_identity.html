<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Actuators Isometric Motion Identity</title>
<style>
  body {
    background-color: #0B1A2A;
    color: #FFFFFF;
    font-family: 'Inter', sans-serif;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
  }
  .stage {
    position: relative;
    width: 500px;
    height: 500px;
  }
  .grid-bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
      linear-gradient(to right, rgba(0, 183, 194, 0.1) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(0, 183, 194, 0.1) 1px, transparent 1px);
    background-size: 20px 20px;
    opacity: 0.8;
  }
  .iso-scene {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
  }

  use { opacity: 0; }
  
  /* Animations */
  #c1 { animation: slide1 4s cubic-bezier(1,0,0,1) infinite; }
  #c2 { animation: slide2 4s cubic-bezier(1,0,0,1) infinite; }
  #c3 { animation: slide3 4s cubic-bezier(1,0,0,1) infinite; }
  #c4 { animation: slide4 4s cubic-bezier(1,0,0,1) infinite; }
  #c5 { animation: slide5 4s cubic-bezier(1,0,0,1) infinite; }
  #c6 { animation: slide6 4s cubic-bezier(1,0,0,1) infinite; }
  #c0 { animation: popCenter 4s cubic-bezier(0,0,0,1) infinite; color: #00B7C2; }

  @keyframes slide1 {
    0%, 10% { transform: translate(100px, 0); opacity: 0; }
    30%, 80% { transform: translate(34.641px, 0); opacity: 1; }
    100% { transform: translate(34.641px, 0); opacity: 0; }
  }
  @keyframes slide2 {
    0%, 15% { transform: translate(-100px, 0); opacity: 0; }
    35%, 80% { transform: translate(-34.641px, 0); opacity: 1; }
    100% { transform: translate(-34.641px, 0); opacity: 0; }
  }
  @keyframes slide3 {
    0%, 20% { transform: translate(50px, -80px); opacity: 0; }
    40%, 80% { transform: translate(17.3205px, -30px); opacity: 1; }
    100% { transform: translate(17.3205px, -30px); opacity: 0; }
  }
  @keyframes slide4 {
    0%, 25% { transform: translate(-50px, -80px); opacity: 0; }
    45%, 80% { transform: translate(-17.3205px, -30px); opacity: 1; }
    100% { transform: translate(-17.3205px, -30px); opacity: 0; }
  }
  @keyframes slide5 {
    0%, 30% { transform: translate(50px, 80px); opacity: 0; }
    50%, 80% { transform: translate(17.3205px, 30px); opacity: 1; }
    100% { transform: translate(17.3205px, 30px); opacity: 0; }
  }
  @keyframes slide6 {
    0%, 35% { transform: translate(-50px, 80px); opacity: 0; }
    55%, 80% { transform: translate(-17.3205px, 30px); opacity: 1; }
    100% { transform: translate(-17.3205px, 30px); opacity: 0; }
  }
  @keyframes popCenter {
    0%, 60% { transform: translate(0, 0) scale(0); opacity: 0; color: #00B7C2;}
    65%, 75% { transform: translate(0, 0) scale(1.1); opacity: 1; color: #FF6A2A; stroke-width: 2.5;}
    76%, 80% { transform: translate(0, 0) scale(1); opacity: 1; color: #FF6A2A; stroke-width: 1.5;}
    100% { transform: translate(0, 0) scale(1); opacity: 0; color: #00B7C2; }
  }

  .title {
    position: absolute;
    bottom: 30px;
    left: 40px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(0, 183, 194, 0.8);
    letter-spacing: 2px;
  }
</style>
</head>
<body>
  <div class="stage">
    <div class="grid-bg"></div>
    
    <div class="iso-scene">
      <svg viewBox="-100 -100 200 200" width="300" height="300">
        <defs>
          <g id="cube">
            <!-- Isometric Cube Form -->
            <polygon points="0,-20 17.3205,-10 17.3205,10 0,20 -17.3205,10 -17.3205,-10" fill="transparent" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
            <line x1="0" y1="0" x2="0" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="0" y1="0" x2="-17.3205" y2="-10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="0" y1="0" x2="17.3205" y2="-10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </g>
        </defs>

        <g>
          <use id="c1" href="#cube" x="34.641" y="0" color="#00B7C2" />
          <use id="c2" href="#cube" x="-34.641" y="0" color="#00B7C2" />
          <use id="c3" href="#cube" x="17.3205" y="-30" color="#00B7C2" />
          <use id="c4" href="#cube" x="-17.3205" y="-30" color="#00B7C2" />
          <use id="c5" href="#cube" x="17.3205" y="30" color="#00B7C2" />
          <use id="c6" href="#cube" x="-17.3205" y="30" color="#00B7C2" />
          <use id="c0" href="#cube" x="0" y="0" color="#00B7C2" />
        </g>
      </svg>
    </div>
  </div>
  <div class="title">ACTUATORS // MOTION_IDENTITY_ISO_V2</div>
</body>
</html>
