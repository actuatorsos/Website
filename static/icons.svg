<svg xmlns="http://www.w3.org/2000/svg" style="display: none;">
  <defs>
    <style>
      /* actuator_logo.svg styles */
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&amp;display=swap');
      .actuator-logo-title {
        font-family: 'Inter', -apple-system, sans-serif;
        font-size: 140px;
        font-weight: 600;
        fill: #00B7C2;
        letter-spacing: 0.05em;
      }
      .actuator-line-main { stroke: #FF6A2A; stroke-width: 2; opacity: 0.5; }
      .actuator-line-tick { stroke: #FF6A2A; stroke-width: 2; opacity: 0.3; }

      /* wordmark.svg styles */
      .wordmark-text {
        font-family: 'Inter', 'Helvetica Neue', Helvetica, sans-serif;
        font-weight: 600;
        font-size: 36px;
        letter-spacing: -0.02em;
        fill: #FFFFFF;
      }
    </style>
    
    <!-- logo.svg defs -->
    <g id="cube">
      <!-- Outer hexagon -->
      <polygon points="0,-20 17.3205,-10 17.3205,10 0,20 -17.3205,10 -17.3205,-10" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      <!-- Inner Y to form isometric cube visible from top/front -->
      <line x1="0" y1="0" x2="0" y2="20" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="-17.3205" y2="-10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="0" y1="0" x2="17.3205" y2="-10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    </g>
  </defs>

  <symbol id="icon-access" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5">
    <rect x="5" y="12" width="14" height="9"/>
    <path d="M7 12V7h10v5"/>
    <rect x="11" y="15" width="2" height="3" fill="#FF6A2A" stroke="none"/>
  </symbol>

  <symbol id="icon-actuator-logo" viewBox="0 0 1000 400">
    <line x1="40" y1="120" x2="960" y2="120" class="actuator-line-main"/>
    <line x1="40" y1="180" x2="960" y2="180" class="actuator-line-main"/>
    <line x1="40" y1="230" x2="960" y2="230" class="actuator-line-main"/>
    <path d="M 60 70 v240 M 150 90 v50 M 260 230 v50 M 340 90 v160 M 480 230 v50 M 640 100 v30 M 750 230 v50 M 880 100 v160 M 940 70 v240" class="actuator-line-tick"/>
    <text x="500" y="230" class="actuator-logo-title" text-anchor="middle">ACTUATORS</text>
  </symbol>

  <symbol id="icon-coordination" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5">
    <rect x="10" y="10" width="4" height="4" stroke="#FF6A2A"/>
    <rect x="3" y="3" width="4" height="4"/>
    <rect x="17" y="3" width="4" height="4"/>
    <rect x="3" y="17" width="4" height="4"/>
    <rect x="17" y="17" width="4" height="4"/>
    <path d="M5 7v3h5M19 7v3h-5M5 17v-3h5M19 17v-3h-5"/>
  </symbol>

  <symbol id="icon-dashboards" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5">
    <rect x="3" y="3" width="18" height="18"/>
    <line x1="9" y1="3" x2="9" y2="21"/>
    <line x1="9" y1="12" x2="21" y2="12"/>
    <rect x="12" y="6" width="6" height="3" fill="#FF6A2A" stroke="none"/>
  </symbol>

  <symbol id="icon-growth" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5">
    <rect x="4" y="14" width="4" height="6"/>
    <rect x="10" y="8" width="4" height="12"/>
    <rect x="16" y="2" width="4" height="18" fill="#FF6A2A" stroke="none"/>
    <rect x="16" y="2" width="4" height="18"/>
    <polyline points="4 14 10 8 16 2"/>
  </symbol>

  <symbol id="icon-layers" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5">
    <polygon points="12 4 4 8 12 12 20 8 12 4"/>
    <polyline points="4 12 12 16 20 12"/>
    <polyline points="4 16 12 20 20 16" stroke="#FF6A2A"/>
  </symbol>

  <symbol id="icon-links" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5">
    <rect x="4" y="14" width="6" height="6"/>
    <rect x="14" y="4" width="6" height="6"/>
    <path d="M10 17h4v-7h3"/>
  </symbol>

  <symbol id="icon-logo" viewBox="0 0 120 120">
    <!-- The 7-Cube Hexagonal Snowflake Structure -->
    <g transform="translate(60, 60)">
      <use href="#cube" x="34.641" y="0" color="#00B7C2"/>
      <use href="#cube" x="-34.641" y="0" color="#00B7C2"/>
      <use href="#cube" x="17.3205" y="-30" color="#00B7C2"/>
      <use href="#cube" x="-17.3205" y="-30" color="#00B7C2"/>
      <use href="#cube" x="17.3205" y="30" color="#00B7C2"/>
      <use href="#cube" x="-17.3205" y="30" color="#00B7C2"/>
      <use href="#cube" x="0" y="0" color="#FF6A2A"/>
    </g>
  </symbol>

  <symbol id="icon-nodes" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round">
    <rect x="3" y="10" width="4" height="4"/>
    <rect x="17" y="10" width="4" height="4"/>
    <rect x="10" y="3" width="4" height="4" stroke="#FF6A2A"/>
    <rect x="10" y="17" width="4" height="4"/>
    <path d="M7 12h3M14 12h3M12 7v3M12 14v3"/>
  </symbol>

  <symbol id="icon-teams" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5">
    <rect x="10" y="2" width="4" height="4" stroke="#FF6A2A"/>
    <rect x="2" y="18" width="4" height="4"/>
    <rect x="18" y="18" width="4" height="4"/>
    <path d="M12 6v6h-8v6"/>
    <path d="M12 12h8v6"/>
  </symbol>

  <symbol id="icon-verification" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5">
    <rect x="3" y="3" width="18" height="18"/>
    <polyline points="7 12 11 16 17 8" stroke="#FF6A2A"/>
  </symbol>

  <symbol id="icon-wordmark" viewBox="0 0 300 50">
    <text x="0" y="38" class="wordmark-text">Actuators</text>
    <rect x="0" y="45" width="170" height="2" fill="#00B7C2"/>
    <rect x="175" y="45" width="15" height="2" fill="#FF6A2A"/>
  </symbol>

  <symbol id="icon-workflows" viewBox="0 0 24 24" fill="none" stroke="#00B7C2" stroke-width="1.5">
    <rect x="3" y="4" width="6" height="4"/>
    <rect x="15" y="4" width="6" height="4"/>
    <rect x="9" y="16" width="6" height="4"/>
    <path d="M6 8v4h6v4M18 8v4h-6"/>
    <circle cx="12" cy="12" r="1.5" fill="#FF6A2A" stroke="none"/>
  </symbol>
</svg>
